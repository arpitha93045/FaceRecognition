[database]
url = postgresql://face_user:password@localhost:5432/facerecog_db

[encryption]
key_file = ~/.faceapp/fernet.key

[recognition]
model_name = buffalo_l
similarity_threshold = 0.45
unknown_threshold = 0.40
top_k = 5
det_size_w = 640
det_size_h = 640

[camera]
default_device_index = 0
frame_skip = 2
reconnect_delay_sec = 3

[app]
photo_storage_dir = ./data/photos
snapshot_dir = ./data/snapshots
log_level = INFO
